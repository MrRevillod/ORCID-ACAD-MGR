openapi: "3.0.3"

info:
  title: "ORCID ACAD MGR API - Academic Module"
  description: |
    API para la gestión de académicos, categorías académicas, opciones
    de categoría y grados académicos.

    Proporciona operaciones CRUD para:
      - **Categorías Académicas** (`/academic-categories`)
      - **Opciones de Categoría** (`/category-options`)
      - **Grados Académicos** (`/degrees`)
      - **Académicos** (`/academics`)
  version: "0.1.0"

servers:
  - url: /api
    description: API Gateway

tags:
  - name: Categorías Académicas
    description: Gestión de categorías académicas por planta
  - name: Opciones de Categoría
    description: Gestión de opciones válidas por categoría académica
  - name: Grados Académicos
    description: Gestión de grados académicos de los académicos
  - name: Académicos
    description: Gestión de académicos

paths:
  # ============================================================================
  # ACADEMIC CATEGORIES
  # ============================================================================
  /academic-categories:
    get:
      tags:
        - Categorías Académicas
      summary: Listar categorías académicas
      description: >
        Obtiene un listado de todas las categorías académicas.
        Soporta filtros opcionales por nombre y/o planta.
      operationId: listAcademicCategories
      parameters:
        - name: name
          in: query
          description: Filtro por nombre (ILIKE)
          required: false
          schema:
            type: string
            maxLength: 255
        - name: planta
          in: query
          description: Filtrar por planta
          required: false
          schema:
            $ref: "#/components/schemas/AcademicPlanta"
      responses:
        "200":
          description: Listado de categorías obtenido exitosamente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AcademicCategory"

    post:
      tags:
        - Categorías Académicas
      summary: Crear categoría académica
      description: Crea una nueva categoría académica en el sistema.
      operationId: createAcademicCategory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAcademicCategoryDto"
      responses:
        "201":
          description: Categoría creada exitosamente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcademicCategory"
        "400":
          description: Error de validación en los datos de entrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
      security:
        - CookieAuth: []

  /academic-categories/{id}:
    get:
      tags:
        - Categorías Académicas
      summary: Obtener categoría por ID
      description: Obtiene una categoría académica específica mediante su UUID.
      operationId: getAcademicCategory
      parameters:
        - name: id
          in: path
          description: UUID de la categoría académica
          required: true
          schema:
            type: string
            format: uuid
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
      responses:
        "200":
          description: Categoría encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcademicCategory"
        "404":
          description: Categoría no encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: 404
                message: "Categoría académica no encontrada"
                error: "Not Found"

  # ============================================================================
  # CATEGORY OPTIONS
  # ============================================================================
  /category-options:
    get:
      tags:
        - Opciones de Categoría
      summary: Listar opciones de categoría
      description: >
        Obtiene un listado de todas las opciones de categoría académica.
        Soporta filtro opcional por categoría.
      operationId: listCategoryOptions
      parameters:
        - name: category_id
          in: query
          description: UUID de la categoría para filtrar opciones
          required: false
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Listado de opciones obtenido exitosamente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AcademicCategoryOption"

    post:
      tags:
        - Opciones de Categoría
      summary: Crear opción de categoría
      description: >
        Crea una nueva opción válida para una categoría académica.
        La combinación categoría + opción debe ser única.
      operationId: createCategoryOption
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryOptionDto"
      responses:
        "201":
          description: Opción creada exitosamente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcademicCategoryOption"
        "400":
          description: Error de validación en los datos de entrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
      security:
        - CookieAuth: []

  /category-options/{id}:
    get:
      tags:
        - Opciones de Categoría
      summary: Obtener opción por ID
      description: Obtiene una opción de categoría específica mediante su UUID.
      operationId: getCategoryOption
      parameters:
        - name: id
          in: path
          description: UUID de la opción de categoría
          required: true
          schema:
            type: string
            format: uuid
          example: b2c3d4e5-f6a7-8901-bcde-f12345678901
      responses:
        "200":
          description: Opción encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcademicCategoryOption"
        "404":
          description: Opción no encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ============================================================================
  # DEGREES
  # ============================================================================
  /degrees:
    get:
      tags:
        - Grados Académicos
      summary: Listar grados académicos
      description: >
        Obtiene un listado de todos los grados académicos.
        Soporta filtro opcional por académico.
      operationId: listDegrees
      parameters:
        - name: academic_id
          in: query
          description: UUID del académico para filtrar grados
          required: false
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Listado de grados obtenido exitosamente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Degree"

    post:
      tags:
        - Grados Académicos
      summary: Crear grado académico
      description: Crea un nuevo grado académico asociado a un académico.
      operationId: createDegree
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDegreeDto"
      responses:
        "201":
          description: Grado creado exitosamente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Degree"
        "400":
          description: Error de validación en los datos de entrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
      security:
        - CookieAuth: []

  /degrees/{id}:
    get:
      tags:
        - Grados Académicos
      summary: Obtener grado por ID
      description: Obtiene un grado académico específico mediante su UUID.
      operationId: getDegree
      parameters:
        - name: id
          in: path
          description: UUID del grado académico
          required: true
          schema:
            type: string
            format: uuid
          example: d4e5f6a7-b8c9-0123-def4-567890123456
      responses:
        "200":
          description: Grado encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Degree"
        "404":
          description: Grado no encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ============================================================================
  # ACADEMICS
  # ============================================================================
  /academics:
    get:
      tags:
        - Académicos
      summary: Listar académicos
      description: >
        Obtiene un listado detallado de todos los académicos con sus datos
        resueltos (departamento, carrera, categoría, opción, planta,
        nacionalidad, puesto de trabajo). Soporta búsqueda por texto y
        ordenamiento por distintos campos.
      operationId: listAcademics
      parameters:
        - name: search
          in: query
          description: >
            Búsqueda por RUT, nombres, apellidos o email (ILIKE).
          required: false
          schema:
            type: string
        - name: sort
          in: query
          description: Campo por el cual ordenar los resultados (ASC)
          required: false
          schema:
            $ref: "#/components/schemas/AcademicSortField"
      responses:
        "200":
          description: Listado de académicos obtenido exitosamente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AcademicView"

    post:
      tags:
        - Académicos
      summary: Crear académico
      description: >
        Crea un nuevo académico en el sistema con todos sus datos
        personales, laborales y de categorización académica.
      operationId: createAcademic
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAcademicDto"
      responses:
        "201":
          description: Académico creado exitosamente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcademicView"
        "400":
          description: Error de validación en los datos de entrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
      security:
        - CookieAuth: []

  /academics/{id}:
    get:
      tags:
        - Académicos
      summary: Obtener académico por ID
      description: >
        Obtiene un académico específico con todos sus datos resueltos
        con sus datos asociados (departamento, carrera, categoría, etc.).
      operationId: getAcademic
      parameters:
        - name: id
          in: path
          description: UUID del académico
          required: true
          schema:
            type: string
            format: uuid
          example: e5f6a7b8-c9d0-1234-ef56-789012345678
      responses:
        "200":
          description: Académico encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcademicView"
        "404":
          description: Académico no encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /academics/import:
    post:
      tags:
        - Académicos
      summary: Importar académicos desde CSV
      description: >
        Importa académicos masivamente desde un archivo CSV.
        Cada fila se procesa como una operación independiente.
        Los campos opcionales vacíos se rellenan con valores por defecto
        (ORCID, país, fecha del grado, universidad, nombre del título).
      operationId: importAcademics
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Archivo CSV con los datos de los académicos
      responses:
        "200":
          description: Importación completada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportResult"
        "400":
          description: Error al procesar el archivo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    CookieAuth:
      type: apiKey
      in: cookie
      name: ACAD_MGR_ACCESS_TOKEN
      description: >
        Cookie HTTP-only que contiene el JWT de acceso.
        Se obtiene automáticamente al iniciar sesión.

  schemas:
    # ==========================================================================
    # ENUMS
    # ==========================================================================
    AcademicPlanta:
      description: Tipo de planta académica
      type: string
      enum:
        - adjunta
        - permanente
      example: permanente

    AcademicOption:
      description: Opción académica (docencia/investigación)
      type: string
      enum:
        - teaching
        - research
      example: teaching

    DegreeKind:
      description: Tipo de grado académico
      type: string
      enum:
        - base
        - advanced
      example: base

    Sex:
      description: Sexo del académico
      type: string
      enum:
        - H
        - M
        - O
      example: H

    AcademicSortField:
      description: Campo de ordenamiento para listar académicos
      type: string
      enum:
        - names
        - paternal_surname
        - maternal_surname
        - joined_at
        - birth_date
      example: paternal_surname

    # ==========================================================================
    # ACADEMIC CATEGORY
    # ==========================================================================
    AcademicCategory:
      description: "Representa una categoría académica (ej: Profesor Titular)"
      type: object
      required:
        - id
        - name
        - planta
      properties:
        id:
          type: string
          format: uuid
          description: UUID único generado automáticamente
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        name:
          type: string
          description: Nombre de la categoría
          minLength: 1
          maxLength: 255
          example: Profesor Titular
        planta:
          $ref: "#/components/schemas/AcademicPlanta"

    CreateAcademicCategoryDto:
      description: Datos de entrada para crear una categoría académica
      type: object
      required:
        - name
        - planta
      properties:
        name:
          type: string
          description: Nombre de la categoría
          minLength: 1
          maxLength: 255
          example: Profesor Titular
        planta:
          $ref: "#/components/schemas/AcademicPlanta"

    # ==========================================================================
    # ACADEMIC CATEGORY OPTION
    # ==========================================================================
    AcademicCategoryOption:
      description: Representa una opción válida para una categoría académica
      type: object
      required:
        - id
        - categoryId
        - option
      properties:
        id:
          type: string
          format: uuid
          description: UUID único generado automáticamente
          example: b2c3d4e5-f6a7-8901-bcde-f12345678901
        categoryId:
          type: string
          format: uuid
          description: UUID de la categoría académica asociada
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        option:
          $ref: "#/components/schemas/AcademicOption"
        hours:
          type: number
          format: double
          nullable: true
          description: Horas asignadas a esta opción (puede estar vacío si no están definidas)
          example: 12

    CreateCategoryOptionDto:
      description: Datos de entrada para crear una opción de categoría
      type: object
      required:
        - categoryId
        - option
      properties:
        categoryId:
          type: string
          format: uuid
          description: UUID de la categoría académica
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        option:
          $ref: "#/components/schemas/AcademicOption"
        hours:
          type: number
          format: double
          nullable: true
          description: Horas asignadas a esta opción (opcional, se validarán contra los valores existentes si se proporcionan)
          example: 12

    # ==========================================================================
    # DEGREE
    # ==========================================================================
    Degree:
      description: Representa un grado académico obtenido por un académico
      type: object
      required:
        - id
        - academicId
        - name
        - university
        - obtainedAt
        - kind
        - countryCode
      properties:
        id:
          type: string
          format: uuid
          description: UUID único generado automáticamente
          example: c3d4e5f6-a7b8-9012-cdef-123456789012
        academicId:
          type: string
          format: uuid
          description: UUID del académico al que pertenece
          example: e5f6a7b8-c9d0-1234-ef56-789012345678
        name:
          type: string
          description: Nombre del grado obtenido
          minLength: 1
          maxLength: 255
          example: Licenciatura en Ciencias de la Computación
        university:
          type: string
          description: Universidad que otorgó el grado
          minLength: 1
          maxLength: 255
          example: Universidad Católica de Temuco
        obtainedAt:
          type: string
          format: date
          description: Fecha de obtención del grado
          example: "2015-12-15"
        kind:
          $ref: "#/components/schemas/DegreeKind"
        countryCode:
          type: string
          description: Código ISO 3166-1 alpha-2 del país
          minLength: 2
          maxLength: 2
          example: CL

    CreateDegreeDto:
      description: Datos de entrada para crear un grado académico
      type: object
      required:
        - academicId
        - name
        - university
        - obtainedAt
        - kind
        - countryCode
      properties:
        academicId:
          type: string
          format: uuid
          description: UUID del académico
          example: e5f6a7b8-c9d0-1234-ef56-789012345678
        name:
          type: string
          description: Nombre del grado
          minLength: 1
          maxLength: 255
          example: Magíster en Ciencias
        university:
          type: string
          description: Universidad que otorga el grado
          minLength: 1
          maxLength: 255
          example: Universidad Católica de Temuco
        obtainedAt:
          type: string
          format: date
          description: Fecha de obtención
          example: "2020-06-30"
        kind:
          $ref: "#/components/schemas/DegreeKind"
        countryCode:
          type: string
          description: Código ISO 3166-1 alpha-2 del país
          minLength: 2
          maxLength: 2
          example: CL

    # ==========================================================================
    # ACADEMIC VIEW
    # ==========================================================================
    AcademicView:
      description: >
        Vista detallada de un académico con todos los datos resueltos.
        Los identificadores se presentan como nombres legibles
        (departamento, carrera, categoría, planta, opción,
        nacionalidad, puesto de trabajo).
      type: object
      required:
        - id
        - names
        - paternalSurname
        - maternalSurname
        - email
        - sex
        - birthDate
        - joinedAt
        - department
        - jce
        - category
        - planta
        - option
        - acadCategoryHours
        - annualDiscountHours
        - nationality
        - city
      properties:
        id:
          type: string
          format: uuid
          description: UUID único del académico
          example: e5f6a7b8-c9d0-1234-ef56-789012345678
        names:
          type: string
          description: Nombres del académico
          example: Juan Carlos
        paternalSurname:
          type: string
          description: Apellido paterno
          example: López
        maternalSurname:
          type: string
          description: Apellido materno
          example: Martínez
        email:
          type: string
          format: email
          description: Correo electrónico institucional
          example: jlopez@uct.cl
        orcid:
          type: string
          description: ORCID ID (formato XXXX-XXXX-XXXX-XXXX)
          nullable: true
          example: "0000-0002-1234-5678"
        sex:
          $ref: "#/components/schemas/Sex"
        birthDate:
          type: string
          format: date
          description: Fecha de nacimiento
          example: "1980-03-15"
        joinedAt:
          type: string
          format: date
          description: Fecha de ingreso a la universidad
          example: "2010-05-01"
        workPosition:
          type: string
          description: Nombre del cargo laboral
          nullable: true
          example: Docente
        department:
          type: string
          description: Nombre del departamento al que pertenece
          example: Ciencias Matemáticas y Físicas
        career:
          type: string
          description: Nombre de la carrera asociada
          nullable: true
          example: Ingeniería Civil en Informática
        jce:
          type: number
          format: double
          description: Jornada de trabajo (0.0 a 1.0)
          minimum: 0
          maximum: 1
          example: 0.5
        category:
          type: string
          description: Nombre de la categoría académica
          example: Profesor Titular
        planta:
          $ref: "#/components/schemas/AcademicPlanta"
        option:
          $ref: "#/components/schemas/AcademicOption"
        acadCategoryHours:
          type: number
          format: double
          nullable: true
          description: Horas semanales dedicadas a la categoría académica
          example: 40.0
        annualDiscountHours:
          type: number
          format: double
          description: Horas de descuento anuales
          example: 120.0
        nationality:
          type: string
          description: Nombre del país de nacionalidad
          example: Chile
        city:
          type: string
          description: Ciudad de residencia
          example: Temuco

    # ==========================================================================
    # CREATE ACADEMIC DTO
    # ==========================================================================
    CreateAcademicDto:
      description: Datos de entrada para crear un académico
      type: object
      required:
        - rut
        - names
        - paternalSurname
        - maternalSurname
        - email
        - orcid
        - sex
        - birthDate
        - joinedAt
        - departmentId
        - jce
        - acadCategoryOptionsId
        - annualDiscountHours
        - nationalityCode
        - city
      properties:
        rut:
          type: string
          description: "RUT del académico (formato: XXXXXXXX-X)"
          pattern: '^\d{7,8}-[\dkK]$'
          example: "12345678-9"
        names:
          type: string
          description: Nombres del académico
          minLength: 1
          maxLength: 255
          example: Juan Carlos
        paternalSurname:
          type: string
          description: Apellido paterno
          minLength: 1
          maxLength: 255
          example: López
        maternalSurname:
          type: string
          description: Apellido materno
          minLength: 1
          maxLength: 255
          example: Martínez
        email:
          type: string
          format: email
          description: Correo electrónico institucional
          example: jlopez@uct.cl
        orcid:
          type: string
          description: "ORCID ID (formato: XXXX-XXXX-XXXX-XXXX)"
          pattern: '^\d{4}-\d{4}-\d{4}-\d{3}[\dX]$'
          example: "0000-0002-1234-5678"
        sex:
          $ref: "#/components/schemas/Sex"
        birthDate:
          type: string
          format: date
          description: "Fecha de nacimiento (no puede ser futura)"
          example: "1980-03-15"
        joinedAt:
          type: string
          format: date
          description: >
            Fecha de ingreso a la universidad. No puede ser futura
            ni anterior a la fundación de la UCT (1959-09-08).
          example: "2010-05-01"
        workPositionId:
          type: string
          format: uuid
          description: UUID de un cargo laboral existente
          nullable: true
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        workPositionNew:
          type: string
          description: Nombre del nuevo cargo laboral (se añade automáticamente si no existe)
          nullable: true
          example: Docente
        departmentId:
          type: string
          format: uuid
          description: UUID del departamento al que pertenece
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        careerId:
          type: string
          format: uuid
          description: UUID de la carrera asociada (opcional)
          nullable: true
          example: c3d4e5f6-a7b8-9012-cdef-123456789012
        jce:
          type: number
          format: double
          description: Jornada de trabajo (0.0 a 1.0)
          minimum: 0
          maximum: 1
          example: 0.5
        acadCategoryOptionsId:
          type: string
          format: uuid
          description: UUID de la opción de categoría académica
          example: b2c3d4e5-f6a7-8901-bcde-f12345678901
        annualDiscountHours:
          type: number
          format: double
          description: Horas de descuento anuales
          example: 120.0
        nationalityCode:
          type: string
          description: Código ISO 3166-1 alpha-2 del país de nacionalidad
          minLength: 2
          maxLength: 2
          example: CL
        city:
          type: string
          description: Ciudad de residencia
          minLength: 1
          maxLength: 255
          example: Temuco

    # ==========================================================================
    # IMPORT RESULT
    # ==========================================================================
    ImportResult:
      description: Resultado de la importación masiva de académicos
      type: object
      required:
        - imported
        - errors
      properties:
        imported:
          type: integer
          description: Cantidad de académicos importados exitosamente
          example: 95
        errors:
          type: array
          description: Errores ocurridos durante la importación
          items:
            $ref: "#/components/schemas/ImportRowError"

    ImportRowError:
      description: Error en una fila específica durante la importación CSV
      type: object
      required:
        - row
        - reasons
      properties:
        row:
          type: integer
          description: Número de fila en el CSV donde ocurrió el error
          example: 45
        reasons:
          type: array
          description: Lista de mensajes de error para la fila
          items:
            type: string
          example:
            - "Departamento 'Inexistente' no encontrado"

    # ==========================================================================
    # COMMON ERROR SCHEMAS
    # ==========================================================================
    ErrorResponse:
      description: Error estándar del API
      type: object
      required:
        - status
        - message
        - error
      properties:
        status:
          type: integer
          description: Código de estado HTTP
          example: 404
        message:
          type: string
          description: Mensaje descriptivo del error
          example: "Categoría académica no encontrada"
        error:
          type: string
          description: Tipo de error
          example: "Not Found"

    ValidationError:
      description: Error de validación en los datos de entrada
      type: object
      required:
        - status
        - message
        - errors
      properties:
        status:
          type: integer
          description: Código de estado HTTP
          example: 400
        message:
          type: string
          description: Mensaje de error general
          example: "Validation error"
        errors:
          type: array
          description: Lista de errores de validación por campo
          items:
            type: object
            properties:
              field:
                type: string
                description: Nombre del campo con error
                example: rut
              message:
                type: string
                description: Descripción del error de validación
                example: "El RUT debe tener el formato XXXXXXXX-X"
